<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>서울더리본치과 팀 배정 뽑기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0f172a; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; color: white; }
        .title-font { font-family: 'Black Han Sans', sans-serif; }
        .comic-font { font-family: 'Jua', sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .pop-up { animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popUp { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .shake { animation: shake 0.5s infinite; }
        @keyframes shake { 0%, 50%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-5deg); } 75% { transform: rotate(5deg); } }
        
        .btn-glow { box-shadow: 0 0 20px rgba(56, 189, 248, 0.4); }
        .card-flip { transition: transform 0.6s; transform-style: preserve-3d; }
        .card-taken { animation: takenPulse 1s ease-out; }
        @keyframes takenPulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); box-shadow: 0 0 15px rgba(255,255,255,0.5); } 100% { transform: scale(1); } }
        
        /* 스크롤바 숨기기 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="relative">

    <!-- 라이브 동기화 뱃지 -->
    <div class="absolute top-4 left-4 flex items-center gap-1 bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full text-[10px] font-bold border border-blue-500/30 shadow-lg z-50">
        <span class="relative flex h-2 w-2">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
        </span>
        LIVE 팀 배정 중
    </div>

    <!-- 관리자용 초기화 버튼 (우측 하단) -->
    <button onclick="window.requestReset()" class="fixed bottom-2 right-2 text-[10px] text-slate-500 bg-slate-800/50 px-2 py-1 rounded opacity-30 hover:opacity-100 z-50 transition-all">
        관리자 리셋
    </button>

    <div id="app" class="w-full max-w-md mx-auto p-5 flex-1 flex flex-col pt-12">
        <!-- 서버 연결 로딩 화면 -->
        <div id="loading-view" class="flex-1 flex justify-center items-center text-slate-400 text-lg font-bold flex-col gap-4">
            <div class="text-5xl animate-bounce">🤝</div>
            <p class="animate-pulse text-sm font-medium text-slate-400">데이터를 동기화 중입니다...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 사용자 Firebase 설정 유지
        const firebaseConfig = {
            apiKey: "AIzaSyAlrDE_xgT6VBwEQ7AtqEkPfIng6tuK38g",
            authDomain: "img0nny.firebaseapp.com",
            projectId: "img0nny",
            storageBucket: "img0nny.firebasestorage.app",
            messagingSenderId: "28395677092",
            appId: "1:28395677092:web:603c15d52699f0fe03cd31"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        // 🚨 상품 추첨과 꼬이지 않도록 문서 이름을 "teams"로 별도 분리했습니다!
        const docRef = doc(db, "bowling_event", "teams");

        // 기기 고유 ID 발급 (중복 참여 방어)
        if (!localStorage.getItem('myTeamDeviceId')) {
            localStorage.setItem('myTeamDeviceId', 'dev_' + new Date().getTime() + '_' + Math.random().toString(36).substr(2, 5));
        }

        // 16개의 카드 초기화 및 랜덤 셔플 함수
        function generateInitialCards() {
            let pool = [];
            for(let i=0; i<4; i++) pool.push({team: 1, name: '1팀', emoji: '🐯', color: 'text-yellow-400', bg: 'bg-yellow-500/20', border: 'border-yellow-500/50'});
            for(let i=0; i<4; i++) pool.push({team: 2, name: '2팀', emoji: '🦅', color: 'text-slate-300', bg: 'bg-slate-300/20', border: 'border-slate-300/50'});
            for(let i=0; i<4; i++) pool.push({team: 3, name: '3팀', emoji: '🐻', color: 'text-amber-500', bg: 'bg-amber-600/20', border: 'border-amber-600/50'});
            for(let i=0; i<4; i++) pool.push({team: 4, name: '4팀', emoji: '🦖', color: 'text-emerald-400', bg: 'bg-emerald-500/20', border: 'border-emerald-500/50'});

            // Fisher-Yates 셔플
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }

            let cards = {};
            for(let i=1; i<=16; i++) {
                cards[i] = { id: i, teamData: pool[i-1], owner: null, deviceId: null, timestamp: null };
            }
            return cards;
        }

        window.cardsData = null;
        const appDiv = document.getElementById('app');

        // 중복 차단 및 자동 라우팅 방어 함수
        window.checkAndEnforceTeamState = function() {
            const savedResult = localStorage.getItem('myTeamResult');
            if (savedResult) {
                const result = JSON.parse(savedResult);
                window.renderMyResultScreen(result);
                return true;
            }
            return false;
        };

        // 서버 실시간 감시
        onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                window.cardsData = data.cards;
                
                const serverResetTime = data.lastReset || 0;
                const localResetTime = localStorage.getItem('lastTeamResetTime') || 0;
                
                if (serverResetTime > localResetTime) {
                    localStorage.removeItem('myTeamResult');
                    localStorage.removeItem('myTeamNickname');
                    localStorage.removeItem('myTeamDeviceId');
                    localStorage.setItem('myTeamDeviceId', 'dev_' + new Date().getTime() + '_' + Math.random().toString(36).substr(2, 5));
                    localStorage.setItem('lastTeamResetTime', serverResetTime);
                }
                
                // 화면 라우팅
                if (window.currentView === 'dashboard') {
                    window.renderDashboardScreen();
                } else if (!window.checkAndEnforceTeamState()) {
                    if (!window.currentView || window.currentView === 'loading' || window.currentView === 'home') {
                        window.renderHomeScreen();
                    } else if (window.currentView === 'team_select') {
                        window.renderTeamSelectScreen();
                    }
                }
            } else {
                setDoc(docRef, { cards: generateInitialCards(), lastReset: new Date().getTime() });
            }
        });

        // 1. 홈 화면 (닉네임 입력)
        window.renderHomeScreen = function() {
            if (window.checkAndEnforceTeamState()) return;
            
            window.currentView = 'home';
            const savedNick = localStorage.getItem('myTeamNickname') || '';

            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col justify-center items-center text-center fade-in">
                    <div class="mb-6 text-6xl drop-shadow-lg">🤝</div>
                    <h2 class="text-xl font-bold text-blue-400 mb-2 comic-font tracking-widest">운명의 조 추첨</h2>
                    <h1 class="text-4xl md:text-5xl title-font text-white mb-8 leading-tight">
                        서울더리본치과<br>팀 배정 뽑기
                    </h1>
                    
                    <div class="w-full max-w-[280px] mb-6">
                        <input type="text" id="nickInput" value="${savedNick}" placeholder="본인의 이름을 입력하세요" class="w-full bg-slate-800/80 border border-slate-600 text-white rounded-xl px-4 py-3 text-center text-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 placeholder-slate-500 transition-all font-bold">
                    </div>

                    <button onclick="window.checkNicknameAndStart()" class="btn-glow bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-black py-4 px-12 rounded-full text-xl hover:scale-105 active:scale-95 transition-all">
                        카드 뽑으러 가기!
                    </button>
                    <p class="mt-8 text-slate-500 text-sm italic font-medium">"어제의 적이 오늘의 동지로!"</p>
                </div>
            `;
        };

        window.checkNicknameAndStart = function() {
            const nick = document.getElementById('nickInput').value.trim();
            const myDeviceId = localStorage.getItem('myTeamDeviceId');
            
            if (!nick) {
                alert("이름(닉네임)을 반드시 입력해주세요!");
                document.getElementById('nickInput').focus();
                return;
            }
            
            // 중복 참여 교차 검증
            const allCards = Object.values(window.cardsData);
            const alreadyWonRecord = allCards.find(c => c.owner === nick || c.deviceId === myDeviceId);
            
            if (alreadyWonRecord) {
                alert(`[중복 차단] 이미 팀 배정이 완료된 이름이거나 기기입니다.\n${alreadyWonRecord.owner}님의 기존 배정 결과를 불러옵니다.`);
                localStorage.setItem('myTeamNickname', alreadyWonRecord.owner);
                localStorage.setItem('myTeamResult', JSON.stringify(alreadyWonRecord.teamData));
                window.renderMyResultScreen(alreadyWonRecord.teamData);
                return;
            }

            localStorage.setItem('myTeamNickname', nick);
            window.renderTeamSelectScreen();
        };

        // 2. 16개 카드 선택 화면
        window.renderTeamSelectScreen = function() {
            if (window.checkAndEnforceTeamState()) return;
            
            window.currentView = 'team_select';
            const myNick = localStorage.getItem('myTeamNickname');
            
            const allCards = Object.values(window.cardsData);
            const takenCount = allCards.filter(c => c.owner !== null).length;

            let html = `
                <div class="fade-in pb-10 w-full">
                    <div class="flex justify-between items-center mb-6">
                        <button onclick="window.renderHomeScreen()" class="flex items-center gap-1 bg-slate-800/80 text-slate-400 px-3 py-1.5 rounded-full border border-slate-700 transition-all hover:text-white text-xs font-bold">
                            ◀ 뒤로
                        </button>
                        <span class="bg-blue-500/20 text-blue-300 px-3 py-1 rounded-full text-xs font-bold border border-blue-500/30">
                            현재 배정 완료 : ${takenCount} / 16
                        </span>
                    </div>
                    
                    <h2 class="text-3xl title-font text-white mb-2 text-center tracking-wide">운명의 카드 선택</h2>
                    <p class="text-slate-400 text-sm mb-8 font-medium text-center"><span class="text-blue-400 font-bold">${myNick}</span>님, 직감에 맡겨 하나의 카드를 터치하세요.</p>
                    
                    <!-- 16개의 카드 그리드 (4x4) -->
                    <div class="grid grid-cols-4 gap-2 md:gap-3">
            `;

            for (let i = 1; i <= 16; i++) {
                const card = window.cardsData[i];
                const isTaken = card.owner !== null;

                if (isTaken) {
                    // 남이 뽑은 카드
                    html += `
                        <div class="aspect-square rounded-xl flex flex-col items-center justify-center p-1 border shadow-sm ${card.teamData.bg} ${card.teamData.border} opacity-80 card-taken">
                            <span class="text-2xl drop-shadow-md mb-1">${card.teamData.emoji}</span>
                            <span class="text-[10px] font-black ${card.teamData.color} tracking-tight">${card.teamData.name}</span>
                            <span class="text-[9px] text-white/80 font-bold bg-black/30 px-1.5 py-0.5 rounded mt-1 truncate max-w-[90%] block text-center">${card.owner}</span>
                        </div>
                    `;
                } else {
                    // 아직 뽑지 않은 카드
                    html += `
                        <div onclick="window.executeDraw(${i})" class="aspect-square rounded-xl bg-gradient-to-br from-slate-700 to-slate-800 border border-slate-600 shadow-md flex flex-col items-center justify-center cursor-pointer hover:scale-105 active:scale-95 transition-all group relative overflow-hidden">
                            <div class="absolute inset-0 bg-white/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                            <span class="text-2xl text-slate-500 group-hover:text-blue-400 transition-colors mb-1 font-black comic-font">?</span>
                            <span class="text-[10px] text-slate-500 font-bold">선택</span>
                        </div>
                    `;
                }
            }
            appDiv.innerHTML = html + `</div></div>`;
        };

        // 3. 트랜잭션 (카드 선택)
        window.executeDraw = async function(cardId) {
            if (window.checkAndEnforceTeamState()) return;

            const myNick = localStorage.getItem('myTeamNickname') || '이름없음';
            const myDeviceId = localStorage.getItem('myTeamDeviceId');

            try {
                // 뽑는 순간 화면에 오버레이 로딩 (연타 방지)
                appDiv.insertAdjacentHTML('beforeend', `<div id="drawOverlay" class="fixed inset-0 bg-slate-900/80 z-50 flex justify-center items-center"><div class="text-5xl animate-spin comic-font">🌀</div></div>`);

                const selectedTeamData = await runTransaction(db, async (transaction) => {
                    const sfDoc = await transaction.get(docRef);
                    let cards = sfDoc.data().cards;
                    
                    // 전체 카드 중 내 기록이 있는지 한 번 더 확인 (서버단 최종 방어)
                    const alreadyWon = Object.values(cards).find(c => c.owner === myNick || c.deviceId === myDeviceId);
                    if (alreadyWon) throw { type: "ALREADY_DRAWN", record: alreadyWon };
                    
                    // 내가 누른 카드가 0.1초 차이로 남이 가져갔는지 확인
                    if (cards[cardId].owner !== null) throw { type: "TAKEN" };
                    
                    // 내 소유로 확정
                    cards[cardId].owner = myNick;
                    cards[cardId].deviceId = myDeviceId;
                    cards[cardId].timestamp = new Date().getTime();

                    transaction.update(docRef, { cards: cards });
                    return cards[cardId].teamData;
                });

                // 성공! 결과 저장 및 이동
                localStorage.setItem('myTeamResult', JSON.stringify(selectedTeamData));
                window.renderMyResultScreen(selectedTeamData);

            } catch (e) {
                const overlay = document.getElementById('drawOverlay');
                if(overlay) overlay.remove();

                if (e.type === "TAKEN") { 
                    alert("앗! 간발의 차이로 다른 분이 먼저 이 카드를 선택했습니다. 다른 카드를 골라주세요!"); 
                    window.renderTeamSelectScreen(); 
                }
                else if (e.type === "ALREADY_DRAWN") {
                    alert("이미 팀 배정이 완료되었습니다! 기존 결과를 불러옵니다.");
                    localStorage.setItem('myTeamResult', JSON.stringify(e.record.teamData));
                    window.renderMyResultScreen(e.record.teamData);
                }
                else { alert("통신 오류가 발생했습니다. 잠시 후 다시 시도해 주세요."); }
            }
        };

        // 4. 내 결과 확인 화면
        window.renderMyResultScreen = function(teamData) {
            window.currentView = 'result';
            const myNick = localStorage.getItem('myTeamNickname') || '고객';

            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col justify-center items-center text-center fade-in px-4 py-8">
                    <p class="text-blue-400 font-bold text-lg mb-2 comic-font tracking-widest">배정 완료!</p>
                    <p class="text-white text-xl font-bold mb-6"><span class="text-blue-300 text-2xl">${myNick}</span>님의 소속 팀은...</p>
                    
                    <div class="w-full max-w-[280px] aspect-square rounded-[2rem] shadow-2xl pop-up border-4 ${teamData.border} ${teamData.bg} relative overflow-hidden mb-10 flex flex-col items-center justify-center">
                        <div class="absolute inset-0 bg-white/10 opacity-30"></div>
                        <div class="text-[100px] mb-2 relative z-10 drop-shadow-xl animate-bounce">${teamData.emoji}</div>
                        <h2 class="text-5xl font-black ${teamData.color} comic-font tracking-widest relative z-10 drop-shadow-md">${teamData.name}</h2>
                    </div>

                    <button onclick="window.renderDashboardScreen()" class="w-full max-w-[280px] bg-slate-800 hover:bg-slate-700 text-white border border-slate-600 py-4 rounded-full font-black text-lg transition-all shadow-lg flex items-center justify-center gap-2">
                        <span>📊</span> 전체 팀 배정 현황 보기
                    </button>
                </div>
            `;
        };

        // 5. 전체 현황 대시보드
        window.renderDashboardScreen = function() {
            window.currentView = 'dashboard';
            
            // 1팀~4팀 그룹화 로직
            let groups = { 1: [], 2: [], 3: [], 4: [] };
            Object.values(window.cardsData).forEach(card => {
                if(card.owner) {
                    groups[card.teamData.team].push(card.owner);
                }
            });

            const teamStyles = {
                1: { name: '1팀', emoji: '🐯', bg: 'bg-yellow-500/10', border: 'border-yellow-500/30', title: 'text-yellow-400' },
                2: { name: '2팀', emoji: '🦅', bg: 'bg-slate-400/10', border: 'border-slate-400/30', title: 'text-slate-300' },
                3: { name: '3팀', emoji: '🐻', bg: 'bg-amber-600/10', border: 'border-amber-600/30', title: 'text-amber-500' },
                4: { name: '4팀', emoji: '🦖', bg: 'bg-emerald-500/10', border: 'border-emerald-500/30', title: 'text-emerald-400' }
            };

            let listHTML = '';
            for(let t=1; t<=4; t++) {
                const style = teamStyles[t];
                const members = groups[t];
                
                // 각 팀은 무조건 4자리가 있음. 채워진 자리는 닉네임, 빈 자리는 [ 대기 중 ]
                let slotsHTML = '';
                for(let s=0; s<4; s++) {
                    if(members[s]) {
                        slotsHTML += `<div class="bg-slate-800 px-3 py-2 rounded-lg text-center font-bold text-white shadow-sm border border-slate-700/50 text-sm truncate">${members[s]}</div>`;
                    } else {
                        slotsHTML += `<div class="bg-slate-900/50 px-3 py-2 rounded-lg text-center font-medium text-slate-600 border border-slate-800 border-dashed text-sm">대기 중</div>`;
                    }
                }

                listHTML += `
                    <div class="${style.bg} ${style.border} border rounded-2xl p-4 mb-4 shadow-md">
                        <div class="flex justify-between items-center mb-3">
                            <h3 class="${style.title} font-black text-xl comic-font flex items-center gap-2">
                                <span class="text-2xl">${style.emoji}</span> ${style.name}
                            </h3>
                            <span class="text-xs bg-slate-800 text-slate-300 px-2 py-1 rounded-md font-bold">${members.length} / 4명</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            ${slotsHTML}
                        </div>
                    </div>
                `;
            }

            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col w-full fade-in pb-10">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl title-font text-white flex items-center gap-2"><span class="text-3xl">📊</span> 팀 배정 현황</h2>
                        <button onclick="window.backToResult()" class="text-slate-400 text-sm hover:text-white bg-slate-800 px-3 py-1 rounded-full border border-slate-700 transition-all">내 결과로 ◀</button>
                    </div>

                    <div class="flex-1 overflow-y-auto no-scrollbar pb-10">
                        ${listHTML}
                    </div>
                </div>
            `;
        };

        window.backToResult = function() {
            window.currentView = null;
            window.checkAndEnforceTeamState(); // 내 결과 화면으로 복귀
        };

        // 관리자 전체 초기화
        window.requestReset = async function() {
            const pw = prompt("관리자 비밀번호를 입력하세요.");
            if (pw === "0000") {
                if(confirm("🚨 경고: 모든 사람의 팀 배정 결과가 싹 초기화되고 카드가 다시 무작위로 섞입니다!\n정말 진행하시겠습니까?")) {
                    const newResetTime = new Date().getTime();
                    // 완전히 새로운 카드로 섞어서 저장
                    await setDoc(docRef, { cards: generateInitialCards(), lastReset: newResetTime });
                    alert("팀 배정 데이터가 완벽하게 리셋되었습니다.");
                    window.renderHomeScreen();
                }
            } else if (pw !== null) { alert("비밀번호가 올바르지 않습니다."); }
        };
    </script>
</body>
</html>
